<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tracking-employee-prototype</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div>
          <p class="eyebrow">PTMK style prototype</p>
          <h1>tracking-employee-prototype</h1>
        </div>
      </div>
      <div class="top-actions">
        <span>Заявки сотрудников</span>
        <button id="refreshButton" class="secondary">Обновить</button>
      </div>
    </header>

    <nav class="navline" aria-label="Основные разделы">
      <span>Главная</span>
      <span>Сотрудники</span>
      <span>Заявки</span>
      <span>Отчеты</span>
      <span>Производительность</span>
    </nav>

    <main class="layout">
      <section class="panel create-panel">
        <h2>Новая заявка</h2>
        <form id="requestForm">
          <label>
            Автор
            <select id="authorId" required></select>
          </label>
          <label>
            Исполнитель
            <select id="assigneeId" required></select>
          </label>
          <label>
            Срок выполнения
            <input id="dueDate" type="date" required>
          </label>
          <label>
            Описание
            <textarea id="description" rows="5" required></textarea>
          </label>
          <button type="submit">Создать заявку</button>
        </form>
        <p id="formMessage" class="message"></p>
      </section>

      <section class="content">
        <section class="metrics" id="metrics"></section>

        <section class="panel">
          <div class="section-heading">
            <h2>Заявки</h2>
            <span id="totalRequests"></span>
          </div>
          <div class="filters">
            <select id="statusFilter">
              <option value="">Все статусы</option>
              <option value="new">Новая</option>
              <option value="in_progress">В работе</option>
              <option value="done">Выполнена</option>
            </select>
            <select id="assigneeFilter">
              <option value="">Все исполнители</option>
            </select>
            <select id="departmentFilter">
              <option value="">Все подразделения</option>
            </select>
            <label class="checkbox">
              <input id="overdueFilter" type="checkbox">
              Просроченные
            </label>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="col-number">Номер</th>
                  <th>Описание</th>
                  <th class="col-person">Автор</th>
                  <th class="col-person">Исполнитель</th>
                  <th class="col-department">Подразделение</th>
                  <th class="col-date">Срок</th>
                  <th class="col-status">Статус</th>
                  <th class="col-actions">Действия</th>
                </tr>
              </thead>
              <tbody id="requestsBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
